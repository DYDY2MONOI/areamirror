<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AREA - Authentification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-toggle {
            display: flex;
            margin-bottom: 30px;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #ddd;
        }
        .form-toggle button {
            flex: 1;
            padding: 12px;
            border: none;
            background: #f8f9fa;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .form-toggle button.active {
            background: #007bff;
            color: white;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0,123,255,0.3);
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .submit-btn:hover {
            background: #0056b3;
        }
        .submit-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
        .message {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .dashboard-link {
            text-align: center;
            margin-top: 20px;
        }
        .dashboard-link a {
            color: #007bff;
            text-decoration: none;
        }
        #loginForm, #registerForm {
            display: none;
        }
        #loginForm.active, #registerForm.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1>🔗 AREA</h1>

        <div class="form-toggle">
            <button id="loginTab" class="active" onclick="showForm('login')">Connexion</button>
            <button id="registerTab" onclick="showForm('register')">Inscription</button>
        </div>

        <div id="message" class="message" style="display: none;"></div>

        <!-- Formulaire de connexion -->
        <form id="loginForm" class="active">
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Mot de passe</label>
                <input type="password" id="loginPassword" required>
            </div>
            <button type="submit" class="submit-btn">Se connecter</button>
        </form>

        <!-- Formulaire d'inscription -->
        <form id="registerForm">
            <div class="form-group">
                <label for="registerEmail">Email</label>
                <input type="email" id="registerEmail" required>
            </div>
            <div class="form-group">
                <label for="registerPassword">Mot de passe</label>
                <input type="password" id="registerPassword" required>
            </div>
            <div class="form-group">
                <label for="registerFirstName">Prénom</label>
                <input type="text" id="registerFirstName">
            </div>
            <div class="form-group">
                <label for="registerLastName">Nom</label>
                <input type="text" id="registerLastName">
            </div>
            <button type="submit" class="submit-btn">S'inscrire</button>
        </form>

        <div class="dashboard-link">
            <a href="test-area.html">Accéder au dashboard (test)</a>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080';
        let currentToken = localStorage.getItem('area_token');

        if (currentToken) {
            checkToken();
        }

        function showForm(formType) {
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');

            if (formType === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
            } else {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.classList.add('active');
                loginForm.classList.remove('active');
            }
            hideMessage();
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
        }

        function hideMessage() {
            document.getElementById('message').style.display = 'none';
        }

        async function checkToken() {
            try {
                const response = await fetch(`${API_BASE}/profile`, {
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    showMessage(`Connecté en tant que ${data.user.email}`, 'success');
                } else {
                    localStorage.removeItem('area_token');
                    currentToken = null;
                }
            } catch (error) {
                localStorage.removeItem('area_token');
                currentToken = null;
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('area_token', data.token);
                    currentToken = data.token;
                    showMessage(`Connexion réussie ! Bienvenue ${data.user.email}`, 'success');
                    setTimeout(() => {
                        window.location.href = 'test-area.html';
                    }, 2000);
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                showMessage('Erreur de connexion au serveur', 'error');
            }
        });
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const firstName = document.getElementById('registerFirstName').value;
            const lastName = document.getElementById('registerLastName').value;

            try {
                const response = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email,
                        password,
                        first_name: firstName,
                        last_name: lastName
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('area_token', data.token);
                    currentToken = data.token;
                    showMessage(`Inscription réussie ! Bienvenue ${data.user.email}`, 'success');
                    setTimeout(() => {
                        window.location.href = 'test-area.html';
                    }, 2000);
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                showMessage('Erreur de connexion au serveur', 'error');
            }
        });
    </script>
</body>
</html>
