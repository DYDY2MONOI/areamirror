version: '3.8'

services:
  area-web-dev:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev -- --host 0.0.0.0

  area-web-prod:
    build:
      context: .
      target: production
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    profiles:
      - production

  area-web-build:
    build:
      context: .
      target: builder
    volumes:
      - ./dist:/app/dist
    profiles:
      - build
