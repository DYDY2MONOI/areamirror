services:
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: area_db
      POSTGRES_USER: area_user
      POSTGRES_PASSWORD: area_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - area_network

  backend:
    build:
      context: ./area-backend
      dockerfile: Dockerfile
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: area_user
      DB_PASSWORD: area_password
      DB_NAME: area_db
      JWT_SECRET: your_jwt_secret_key_here
      GITHUB_CLIENT_ID: Ov23liQ7GPEEWs0hVzyM
      GITHUB_CLIENT_SECRET: d20831e34517a30903d8166a67d7aee11969be99
      GOOGLE_CLIENT_ID: 635456942993-cl4hm8rvh0pcslhjfko23cbgh18o4cdq.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: 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
      GOOGLE_REDIRECT_URI: http://localhost:3000/callback
    ports:
      - "8080:8080"
    depends_on:
      - database
    networks:
      - area_network
    volumes:
      - ./area-backend/uploads:/root/uploads

  frontend:
    build:
      context: ./area_front
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
      - database
    networks:
      - area_network

volumes:
  postgres_data:

networks:
  area_network:
    driver: bridge
