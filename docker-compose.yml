services:
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: area_db
      POSTGRES_USER: area_user
      POSTGRES_PASSWORD: area_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - area_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U area_user -d area_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./area-backend
      dockerfile: Dockerfile
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: area_user
      DB_PASSWORD: area_password
      DB_NAME: area_db
      JWT_SECRET: your_jwt_secret_key_here
      GITHUB_CLIENT_ID: Ov23liQ7GPEEWs0hVzyM
      GITHUB_CLIENT_SECRET: d20831e34517a30903d8166a67d7aee11969be99
      GOOGLE_CLIENT_ID: 635456942993-cl4hm8rvh0pcslhjfko23cbgh18o4cdq.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: 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
      
      GOOGLE_ACCESS_TOKEN: ya29.a0AQQ_BDTJ-yHNqlzW3TYsjPNBSx6aV-8ez-e4BCc-dBqYWy1G1AMV0-_gHOUMMAVbNh6-jusaSvID93Y7WMPAe-VQA0bzYBOgEEzVQ2z15zNPIvx3KKw26hd1uLjcZjYgeUF99VVfxTo-VRKOvfkL3aupl-o4Ggv0atSKNwFBzijapN-CXevy4VWC89WU5MmiGZWkCC8aCgYKATUSARcSFQHGX2Mi47aW8AwceUVkgBVGKP6xuw0206
      GOOGLE_REFRESH_TOKEN: 1//040tCPusos1jhCgYIARAAGAQSNwF-L9Irh3ab-7L6rzjJa_mtz6kHVODGTDXvkfV-jEDwT8zcyR82rGfIGBtfotQB4g1k5X7ckUs      
      GOOGLE_REDIRECT_URI: http://localhost:3000/callback
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - area_network
    volumes:
      - ./area-backend/uploads:/root/uploads
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - area_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  area_network:
    driver: bridge
