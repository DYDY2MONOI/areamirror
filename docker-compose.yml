    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - area_network
    volumes:
      - ./area-backend/uploads:/root/uploads
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_FACEBOOK_CLIENT_ID: 827003503004798
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - area_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  area_network:
    driver: bridge
